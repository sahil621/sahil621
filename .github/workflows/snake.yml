name: Generate Snake

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Generate Snake Animation
        uses: Platane/snk@v3
        with:
          github_user_name: sahil621
          outputs: |
            dist/github-contribution-grid-snake.svg?color_snake=#00FFFF&color_dots=#0D1117,#003B46,#006064,#00FFFF,#FFFFFF
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=#00FFFF


      - name: Push Snake Animation
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./dist
          publish_branch: output

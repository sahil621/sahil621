name: Generate Snake Animation 🐍

on:
  schedule:
    - cron: "0 */12 * * *"

  workflow_dispatch:


jobs:
  generate:

    runs-on: ubuntu-latest

    permissions:
      contents: write


    steps:

      # Generate snake
      - name: Generate Snake
        uses: Platane/snk@v3

        with:

          github_user_name: sahil621


          outputs: |

            dist/github-contribution-grid-snake.svg?color_snake=%2300FFFF&color_dots=%230D1117,%2300333A,%23006666,%2300FFFF,%23FFFFFF

            dist/github-contribution-grid-snake-dark.svg?palette=github-dark&color_snake=%2300FFFF


      # Push generated files
      - name: Deploy Snake

        uses: peaceiris/actions-gh-pages@v4

        with:

          github_token: ${{ secrets.GITHUB_TOKEN }}

          publish_dir: ./dist

          publish_branch: output
